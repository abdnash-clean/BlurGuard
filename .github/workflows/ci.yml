name: BlurGuard CI Pipeline

# Trigger the workflow on pushes to main, or any Pull Request
on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest # Runs on a Linux virtual machine

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (Required for modern Android Gradle Plugin / Compose)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Enable Gradle Caching (Makes subsequent builds MUCH faster)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Run Android Lint (Finds XML issues, missing translations, memory leaks)
      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      # 5. Run Unit Tests (Crucial for testing core:tracking and ViewModels)
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # 6. Build the Debug APK (Ensures the app actually compiles successfully)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload the APK so you can download it from GitHub
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blurguard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7